<script>
//for loop tasks

// 1-printing numbers from 1 to 10
for(let i=1; i<=10; i++){
    console.log(i);
}


//2-printing even numbers from 1 to 20
for(let i=1; i<=20; i++){
    if(i%2==0){
        console.log(i);
    }
}
//or
for(let i=2; i<=20; i+=2){
    console.log(i);
}


//3-printing multipication table of 5

    console.log(`5 x ${i} = ${5*i}`);
}


//4-sum 0f numbers from 1 to 50

for(let i=1; i<=50; i++){
    sum+=i;
}  
console.log(`The sum of numbers from 1 to 50 is ${sum}`);

for(let i=10; i>=1; i--){

}

}
